<!-- Hero HERE -->
<section class="bg-gray-100 px-8 py-16 relative overflow-hidden">
  <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-12 items-center">
    <!-- LEFT CONTENT -->
    <div>
      <p class="uppercase tracking-[5px] text-gray-500 mb-4">
        New Collection 2026
      </p>

      <h1 class="text-5xl font-bold leading-tight mb-6">
        Minimal Fashion <br />
        For Modern Style
      </h1>

      <p class="text-gray-500 text-lg mb-8">
        Discover premium shoes, clothes and fashion essentials.
      </p>

      <button (click)="scrollToProducts()"
        class="bg-black text-white px-8 py-4 rounded-xl hover:bg-gray-800 transition duration-300"
      >
        Shop Now
      </button>
    </div>

    <!-- RIGHT SLIDER -->
    <div
      class="relative w-full max-w-[500px] h-[300px] md:h-[500px] overflow-hidden rounded-3xl shadow-2xl mx-auto"
    >
      <div
        class="flex transition-transform duration-700 ease-in-out"
        [style.transform]="'translateX(-' + currentIndex * 100 + '%)'"
      >
        <img
          *ngFor="let img of images"
          [src]="img.src"
          class="w-full h-[300px] md:h-[500px] object-cover flex-shrink-0"
        />
      </div>
      <!-- LEFT ARROW -->
      <button
        (click)="prev()"
        class="absolute left-3 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white p-3 rounded-full shadow-md"
      >
        ‹
      </button>

      <!-- RIGHT ARROW -->
      <button
        (click)="next()"
        class="absolute right-3 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white p-3 rounded-full shadow-md"
      >
        ›
      </button>
    </div>
  </div>
</section>
<!-- //HERO  -->
<!-- PRODUCT -->
<div class="bg-white mt-10">
  <div
      class="mx-auto max-w-7xl px-4 py-24 sm:px-6 sm:py-24 lg:px-8 shadow-2xl rounded-2xl"
  >
    <div
      class="mt-6 grid grid-cols-1 gap-x-6 gap-y-10 sm:grid-cols-2 lg:grid-cols-4 xl:gap-x-8"
    >
      <div
        *ngFor="let product of filteredProducts " (click)="goToProduct(product.id)"
        class="group relative cursor-pointer bg-white rounded-2xl overflow-hidden p-2 hover:translate-y-2 hover:shadow-2xl transition duration-500"
      >
        <div class="overflow-hidden">
          <img
            [src]="product.image"
            class="aspect-square w-full rounded-md h-80 object-cover group-hover:scale-105 transition duration-700"
          />
        </div>
        <!-- content -->
        <div class="p-5">
          <!-- CATEGORY -->
          <p class="text-sm text-gray-400 uppercase tracking-widest mb-2">
            {{ product.category }}
          </p>
          <!-- Tittle -->
          <h2 class="text-lg font-semibold mb-3 line-clamp-1">
            {{ product.name }}
          </h2>
          <!-- Pric+ but -->
          <div class="flex items-center justify-between">
            <p class="text-xl font-bold">{{ product.price }}</p>
            <button
              class="bg-black text-white px-5 py-2 rounded-xl hover:bg-gray-800 transition duration-300"
            >
              Shop
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
