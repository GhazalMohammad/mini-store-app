<section *ngIf="product" class="max-w-6xl mx-auto py-20 px-6 grid md:grid-cols-2 gap-12">

  <!-- IMAGE -->
  <div>
    <img [src]="product.image"
         class="w-full h-[500px] object-cover rounded-3xl shadow-lg">
  </div>

  <!-- INFO -->
  <div>

    <h1 class="text-4xl font-bold mb-4">
      {{ product.name }}
    </h1>
    
      <p class="text-gray-500 mb-6">
      {{ product.category }}
    </p>


    <p class="text-gray-800 mb-6">
      {{ product.desc }}
    </p>

    <p class="text-3xl font-bold mb-8">
      ${{ product.price }}
    </p>
  
    

    <button (click)="addToCart()" class="bg-black text-white px-6 py-3 rounded-xl hover:bg-gray-800">
      Add To Cart
    </button>

  </div>

</section>
