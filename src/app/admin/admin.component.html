<div class="max-w-6xl mx-auto mt-10 grid grid-cols-1 md:grid-cols-2 gap-8">

  <!-- FORM -->
  <div class="bg-white p-8 rounded-2xl shadow-lg">

    <h1 class="text-center text-3xl font-bold mb-6">
      Admin Panel
    </h1>

    <input
      type="text"
      placeholder="Product Name"
      [(ngModel)]="name"
      class="w-full border p-3 rounded-lg mb-4"
    />

    <input
      type="number"
      placeholder="Product Price"
      [(ngModel)]="price"
      class="w-full border p-3 rounded-lg mb-4"
    />

    <select
      [(ngModel)]="category"
      class="w-full border p-3 rounded-lg mb-4"
    >
      <option value="">Choose Category</option>
      <option value="Shoes">Shoes</option>
      <option value="Clothes">Clothes</option>
    </select>

    <input
      type="file"
      #fileInput
      (change)="onFileSelected($event)"
      class="w-full border p-3 rounded-lg mb-4"
    />

    <img
      *ngIf="selectedImage"
      [src]="selectedImage"
      class="w-40 h-40 object-cover rounded-xl mb-4"
    />

    <textarea
      [(ngModel)]="desc"
      placeholder="Product Description"
      rows="4"
      class="w-full border p-3 rounded-lg mb-4 resize-none"
    ></textarea>
    <label class="flex items-center gap-2 mb-4">
  <input
    type="checkbox"
    [(ngModel)]="featured"
  >
  Featured Product
</label>


    <button
      (click)="addProduct()"
      class="w-full bg-black text-white px-6 py-3 rounded-xl hover:bg-gray-900 transition"
      [disabled]="!name || price <= 0 || !category || !selectedImage"
      [class.opacity-50]="!name || price <= 0 || !category || !selectedImage"
    >
      {{ editingId ? 'Update Product' : 'Add Product' }}
    </button>

  </div>

  <!-- PRODUCTS LIST -->
  <div>

    <h2 class="text-2xl font-bold mb-4">
      Products
    </h2>

    <div
      *ngFor="let product of products"
     class="flex items-center justify-between border rounded-xl p-3 mb-3 bg-white shadow-sm"
    >

      <!-- LEFT -->
      <div class="flex items-center gap-3">

        <img
          [src]="product.image"
          class="w-12 h-12 object-cover rounded-lg"
        />

        <div>
          <h3 class="font-semibold text-sm">
            {{ product.name }}
          </h3>

          <p class="text-xs text-gray-500">
            ${{ product.price }}
          </p>
        </div>

      </div>

      <!-- ACTIONS -->
      <div class="flex gap-2">

        <button
          (click)="editProduct(product)"
          class="bg-blue-600 text-white px-3 py-1 rounded-lg text-sm hover:bg-blue-400 transition"
        >
          Edit
        </button>

        <button
          (click)="deleteProduct(product.id)"
          class="bg-red-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-red-400 transition"
        >
          Delete
        </button>

      </div>

    </div>

  </div>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 max-w-4xl mx-auto mb-6">

  <div class="bg-blue-500 text-white p-4 rounded-xl text-center">
    <h2 class="text-xl font-bold">{{ totalProducts }}</h2>
    <p>Products</p>
  </div>

  <div class="bg-green-500 text-white p-4 rounded-xl text-center">
    <h2 class="text-xl font-bold">{{ totalOrders }}</h2>
    <p>Orders</p>
  </div>

  <div class="bg-purple-500 text-white p-4 rounded-xl text-center">
    <h2 class="text-xl font-bold">${{ totalSales }}</h2>
    <p>Sales</p>
  </div>

</div>

</div>


<!-- ERROR ALERT -->
<div
  *ngIf="showError"
  class="fixed inset-0 bg-black/50 flex items-center justify-center z-50"
>
  <div class="bg-white p-6 rounded-2xl shadow-2xl w-80 text-center">

    <h3 class="text-xl font-bold text-red-500 mb-3">
      ⚠ Warning
    </h3>

    <p class="mb-5">
      {{ errorMessage }}
    </p>

    <button
      (click)="showError = false"
      class="bg-red-500 text-white px-5 py-2 rounded-xl hover:bg-red-600"
    >
      OK
    </button>

  </div>
</div>

<!-- SUCCESS TOAST -->
<div
  *ngIf="showSuccess"
  class="fixed bottom-5 right-5 bg-green-600 text-white px-6 py-3 rounded-xl shadow-xl z-50 transition-all duration-300"
>
  ✅ {{ successMessage }}
</div>
